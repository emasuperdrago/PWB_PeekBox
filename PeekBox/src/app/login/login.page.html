<ion-content [fullscreen]="true" [scrollY]="false" class="login-content">

  <div class="fixed-bg">
    <img [src]="bgImage" alt="Sfondo" />
  </div>
  <div class="hero-overlay"></div>

  <header class="topbar">
    <div class="topbar-logo" routerLink="/benvenuto" style="cursor:pointer;">
      <img src="assets/icon/logoTitolo1.png" alt="PeekBox" class="topbar-logo-img" />
      <span class="logo-txt">
        <span class="pk">Peek</span><span class="bx">Box</span>
      </span>
    </div>
    <button class="btn-nav" routerLink="/registrazione">
      Registrati
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
  </header>

  <div class="login-wrapper">
    <div class="login-card">

      <div class="badge">
        <span class="badge-dot"></span>
        Il tuo inventario domestico digitale
      </div>

      <h1 class="login-title">
        Bentornato nel<br>
        <span class="title-accent">tuo inventario.</span>
      </h1>
      <p class="login-sub">Accedi per gestire i tuoi contenitori virtuali</p>

      <div class="field-group">
        <label class="field-label">Email</label>
        <ion-input
          type="email"
          [(ngModel)]="email"
          fill="outline"
          placeholder="nome@esempio.it"
          class="custom-input">
        </ion-input>
      </div>

      <div class="field-group">
        <label class="field-label">Password</label>
        <ion-input
          type="password"
          [(ngModel)]="password"
          fill="outline"
          placeholder="Inserisci password"
          class="custom-input">
          <ion-input-password-toggle slot="end"></ion-input-password-toggle>
        </ion-input>
        <div class="forgot-row">
          <a href="#" (click)="recuperaPassword($event)" class="forgot-link">Password dimenticata?</a>
        </div>
      </div>

      <div class="cta-row">
        <button
          class="btn-primary"
          [disabled]="!email || !password"
          (click)="accedi()">
          <span>Accedi</span>
          <div class="shimmer"></div>
        </button>
      </div>

    </div>
  </div>

</ion-content>
