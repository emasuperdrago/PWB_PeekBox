<ion-content [fullscreen]="true" class="login-content">

  <!-- Slideshow sfondo -->
  <div class="slideshow">
    <div *ngFor="let src of slideSrcs; let i = index"
         class="slide"
         [class.active]="i === currentSlide">
      <img [src]="src" alt="" />
    </div>
  </div>
  <div class="hero-overlay"></div>

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-logo" routerLink="/benvenuto" style="cursor:pointer;">
      <img src="assets/icon/logoTitolo1.png" alt="PeekBox" class="topbar-logo-img" />
      <span class="logo-txt">
        <span class="pk">Peek</span><span class="bx">Box</span>
      </span>
    </div>
    <button class="btn-nav" routerLink="/login">
      Accedi
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
  </header>

  <!-- CARD REGISTRAZIONE -->
  <div class="login-wrapper">
    <div class="login-card">

      <!-- Badge -->
      <div class="badge">
        <span class="badge-dot"></span>
        Inizia gratuitamente
      </div>

      <h1 class="login-title">
        Crea il tuo nuovo<br>
        <span class="title-accent">account.</span>
      </h1>
      <p class="login-sub">Tieni finalmente ogni cosa sotto controllo assoluto.</p>

      <!-- Form fields -->
      <div class="field-group">
        <label class="field-label">Nome Profilo</label>
        <ion-input
          type="text"
          [(ngModel)]="nomeProfilo"
          fill="outline"
          placeholder="Es. MarcoRossi"
          class="custom-input">
        </ion-input>
      </div>

      <div class="field-group">
        <label class="field-label">Email</label>
        <ion-input
          type="email"
          [(ngModel)]="email"
          fill="outline"
          placeholder="nome@esempio.it"
          class="custom-input">
        </ion-input>
      </div>

      <div class="field-group">
        <label class="field-label">Password</label>
        <ion-input
          type="password"
          [(ngModel)]="password"
          fill="outline"
          placeholder="Scegli una password"
          class="custom-input">
          <ion-input-password-toggle slot="end"></ion-input-password-toggle>
        </ion-input>
      </div>

      <!-- CTA -->
      <div class="cta-row">
        <button
          class="btn-primary"
          [disabled]="!nomeProfilo || !email || !email.includes('@') || email.lastIndexOf('.') <= email.indexOf('@') || !password"
          (click)="registrati()">
          <span>Registrati</span>
          <div class="shimmer"></div>
        </button>
      </div>

    </div>
  </div>

</ion-content>
